<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영진반경측정기</title>
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=1zqd3bjv3u"></script>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#03C75A;--g2:#00a648;--bg:#0c0e14;--card:#161920;--bd:#222533;--red:#ff4757;--tx:#eef0f5;--mu:#5a6070;--gold:#f59e0b}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
header{height:52px;background:var(--g);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:999}
.brand{display:flex;align-items:center;white-space:nowrap;flex-shrink:0}
.brand-all{font-family:'Jua',sans-serif;font-size:19px;color:#fff;letter-spacing:-0.5px;text-shadow:2px 2px 0px rgba(0,0,0,0.2);display:flex}
.brand-all span{display:inline-block;animation:bounce 1.2s infinite alternate}
.brand-all span:nth-child(1){animation-delay:.00s}
.brand-all span:nth-child(2){animation-delay:.08s}
.brand-all span:nth-child(3){animation-delay:.16s}
.brand-all span:nth-child(4){animation-delay:.24s}
.brand-all span:nth-child(5){animation-delay:.32s}
.brand-all span:nth-child(6){animation-delay:.40s}
.brand-all span:nth-child(7){animation-delay:.48s}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-3px)}}
.hs{flex:1;display:flex;gap:6px;margin-left:8px}
.hs input{flex:1;padding:7px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.25);color:#fff;font-size:13px;outline:none;min-width:0}
.hs input::placeholder{color:rgba(255,255,255,.6)}
.hs button{padding:7px 14px;background:#fff;color:var(--g2);border:none;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
#mw{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%}
.lock-badge{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:500;background:var(--gold);color:#000;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;pointer-events:none;display:none}
.lock-badge.show{display:block}
.tbs{position:absolute;top:12px;right:10px;z-index:500;display:flex;flex-direction:column;gap:3px}
.tb{padding:5px 10px;background:rgba(12,14,20,.85);backdrop-filter:blur(6px);border:1px solid var(--bd);border-radius:6px;color:var(--mu);font-size:10px;cursor:pointer;white-space:nowrap;transition:all .2s}
.tb.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:700}
.btns{position:absolute;bottom:14px;right:10px;z-index:500;display:flex;flex-direction:column;gap:6px;align-items:center}
#compass{width:40px;height:40px;pointer-events:none;flex-shrink:0}
#compass svg{width:100%;height:100%;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.ib{width:40px;height:40px;background:rgba(12,14,20,.9);border:1px solid var(--bd);border-radius:50%;color:var(--g);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:all .2s;flex-shrink:0}
.ib.tracking{background:var(--g);color:#fff;border-color:var(--g)}
.ib.locked{background:var(--gold);color:#000;border-color:var(--gold)}
.ib.on-purple{background:#a855f7;color:#fff;border-color:#a855f7}
.ib.on-blue{background:#2563eb;color:#fff;border-color:#2563eb}
.ib.on-red{background:#ff4757;color:#fff;border-color:#ff4757}

/* 투표소 팝업 */
.vote-popup{
  position:absolute;bottom:14px;left:10px;z-index:600;
  background:rgba(15,17,23,0.95);
  border:1px solid #2563eb;
  border-radius:12px;
  padding:10px 14px;
  max-width:220px;
  display:none;
  backdrop-filter:blur(10px);
}
.vote-popup.show{display:block}
.vote-popup .vp-type{font-size:9px;color:#2563eb;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.vote-popup .vp-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px}
.vote-popup .vp-addr{font-size:10px;color:var(--mu);line-height:1.5}
.vote-popup .vp-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--mu);font-size:14px;cursor:pointer}

#panel{background:var(--card);border-top:2px solid var(--g);flex-shrink:0;padding:12px 14px 10px;display:flex;flex-direction:column;gap:9px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.sb{background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:9px 10px}
.sb.hl{border-color:var(--g)}
.sb.hl.locked-stat{border-color:var(--gold)}
.sl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:3px}
.sv{font-family:monospace;font-size:14px;font-weight:700;color:var(--tx);line-height:1}
.sb.hl .sv{color:var(--g);font-size:17px}
.sb.hl.locked-stat .sv{color:var(--gold)}
.sr{display:flex;flex-direction:column;gap:4px}
.st{display:flex;justify-content:space-between;font-size:10px;color:var(--mu)}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;background:var(--bd);border-radius:4px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--g);border-radius:50%;cursor:pointer;box-shadow:0 0 0 3px rgba(3,199,90,.2)}
input[type=range]:disabled{opacity:.4}
.br{display:flex;align-items:center;justify-content:space-between;gap:6px}
.ps{display:flex;gap:4px;flex-wrap:wrap}
.pb{padding:4px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:12px;color:var(--mu);font-size:10px;cursor:pointer;transition:all .15s}
.pb.on{background:var(--g);color:#fff;border-color:var(--g);font-weight:700}
.pb:disabled{opacity:.4;cursor:not-allowed}
.clr{padding:6px 12px;background:transparent;border:1px solid var(--red);border-radius:7px;color:var(--red);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .2s}
.ci{font-size:9px;color:var(--mu);text-align:center;font-family:monospace}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="brand">
    <div class="brand-all">
      <span>영</span><span>진</span><span>반</span><span>경</span><span>측</span><span>정</span><span>기</span>
    </div>
  </div>
  <div class="hs">
    <input type="text" id="si" placeholder="주소·장소 검색…" onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">검색</button>
  </div>
</header>

<div id="mw">
  <div id="map"></div>
  <div class="lock-badge" id="lockBadge">🔒 반경 고정됨</div>

  <div class="tbs">
    <button class="tb on" onclick="setType('NORMAL',this)">🗺 일반</button>
    <button class="tb" onclick="setType('SATELLITE',this)">🛰 위성</button>
    <button class="tb" onclick="setType('TERRAIN',this)">🗻 지형</button>
    <button class="tb" onclick="setType('HYBRID',this)">🌐 혼합</button>
  </div>

  <div class="btns">
    <div id="compass">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="19" fill="rgba(12,14,20,0.9)" stroke="#222533" stroke-width="1.5"/>
        <line x1="20" y1="2" x2="20" y2="6" stroke="#5a6070" stroke-width="1"/>
        <line x1="20" y1="34" x2="20" y2="38" stroke="#5a6070" stroke-width="1"/>
        <line x1="2" y1="20" x2="6" y2="20" stroke="#5a6070" stroke-width="1"/>
        <line x1="34" y1="20" x2="38" y2="20" stroke="#5a6070" stroke-width="1"/>
        <text x="20" y="11" text-anchor="middle" font-size="6" font-weight="bold" fill="#ff4757">N</text>
        <text x="20" y="33" text-anchor="middle" font-size="5" fill="#5a6070">S</text>
        <text x="33" y="22" text-anchor="middle" font-size="5" fill="#5a6070">E</text>
        <text x="7" y="22" text-anchor="middle" font-size="5" fill="#5a6070">W</text>
        <g id="needle" transform="rotate(0,20,20)">
          <polygon points="20,4 17,20 20,17 23,20" fill="#ff4757"/>
          <polygon points="20,36 17,20 20,23 23,20" fill="#eef0f5" opacity="0.6"/>
        </g>
      </svg>
    </div>
    <button class="ib on-purple" id="dongBtn" onclick="toggleDong()">🏘</button>
    <button class="ib" id="preBtn" onclick="toggleVote('pre')">🗳</button>
    <button class="ib" id="dayBtn" onclick="toggleVote('day')">📍</button>
    <button class="ib" id="lockBtn" onclick="toggleLock()">🔓</button>
    <button class="ib" id="trackBtn" onclick="toggleTracking()">◎</button>
    <button class="ib" onclick="locateOnce()">⊕</button>
  </div>

  <!-- 투표소 팝업 -->
  <div class="vote-popup" id="votePopup">
    <button class="vp-close" onclick="document.getElementById('votePopup').classList.remove('show')">✕</button>
    <div class="vp-type" id="vpType"></div>
    <div class="vp-name" id="vpName"></div>
    <div class="vp-addr" id="vpAddr"></div>
  </div>
</div>

<div id="panel">
  <div class="stats">
    <div class="sb hl" id="statR"><div class="sl">반경</div><div class="sv" id="vR">—</div></div>
    <div class="sb"><div class="sl">지름</div><div class="sv" id="vD">—</div></div>
    <div class="sb"><div class="sl">면적</div><div class="sv" id="vA">—</div></div>
  </div>
  <div class="sr">
    <div class="st"><span>반경 조절</span><span id="sv">500 m</span></div>
    <input type="range" id="sl" min="100" max="50000" step="100" value="500" oninput="onSl(this.value)">
  </div>
  <div class="br">
    <div class="ps" id="ps"></div>
    <button class="clr" onclick="clearAll()">🗑 초기화</button>
  </div>
  <div class="ci" id="ci">중심점을 설정하세요</div>
</div>
</div>

<script>
const map=new naver.maps.Map('map',{center:new naver.maps.LatLng(35.1796,129.0756),zoom:14,mapTypeId:naver.maps.MapTypeId.NORMAL,scaleControl:false});
let cM=null,circ=null,eM=null,myDot=null,myAcc=null,myArrow=null;
let rM=500,watchId=null,isTracking=false,isLocked=false,lastHeading=0;
let dongPolygons=[],dongLabels=[],showDong=true;
let preMarkers=[],dayMarkers=[],showPre=false,showDay=false;

const API_KEY='2f35c409521eb7f8c33957cc8940eaff7293e97661e67972d65ca487f1562784';
const SG_ID='20260603'; // 2026 지방선거

// ── 연제구 행정동 ──────────────────────────────────────────
const YEONJE_DONG={type:'FeatureCollection',features:[
  {type:'Feature',properties:{name:'거제1동'},geometry:{type:'Polygon',coordinates:[[[129.0682,35.1889],[129.0721,35.1889],[129.0721,35.1861],[129.0752,35.1858],[129.0752,35.1832],[129.0682,35.1832],[129.0682,35.1889]]]}},
  {type:'Feature',properties:{name:'거제2동'},geometry:{type:'Polygon',coordinates:[[[129.0752,35.1889],[129.0802,35.1889],[129.0802,35.1832],[129.0752,35.1832],[129.0752,35.1858],[129.0721,35.1861],[129.0721,35.1889],[129.0752,35.1889]]]}},
  {type:'Feature',properties:{name:'거제3동'},geometry:{type:'Polygon',coordinates:[[[129.0682,35.1832],[129.0752,35.1832],[129.0752,35.1780],[129.0682,35.1780],[129.0682,35.1832]]]}},
  {type:'Feature',properties:{name:'거제4동'},geometry:{type:'Polygon',coordinates:[[[129.0752,35.1832],[129.0802,35.1832],[129.0802,35.1780],[129.0752,35.1780],[129.0752,35.1832]]]}},
  {type:'Feature',properties:{name:'연산1동'},geometry:{type:'Polygon',coordinates:[[[129.0802,35.1889],[129.0852,35.1889],[129.0852,35.1840],[129.0802,35.1840],[129.0802,35.1889]]]}},
  {type:'Feature',properties:{name:'연산2동'},geometry:{type:'Polygon',coordinates:[[[129.0852,35.1889],[129.0910,35.1889],[129.0910,35.1840],[129.0852,35.1840],[129.0852,35.1889]]]}},
  {type:'Feature',properties:{name:'연산3동'},geometry:{type:'Polygon',coordinates:[[[129.0802,35.1840],[129.0852,35.1840],[129.0852,35.1780],[129.0802,35.1780],[129.0802,35.1840]]]}},
  {type:'Feature',properties:{name:'연산4동'},geometry:{type:'Polygon',coordinates:[[[129.0852,35.1840],[129.0910,35.1840],[129.0910,35.1780],[129.0852,35.1780],[129.0852,35.1840]]]}},
  {type:'Feature',properties:{name:'연산5동'},geometry:{type:'Polygon',coordinates:[[[129.0682,35.1780],[129.0752,35.1780],[129.0752,35.1720],[129.0682,35.1720],[129.0682,35.1780]]]}},
  {type:'Feature',properties:{name:'연산6동'},geometry:{type:'Polygon',coordinates:[[[129.0752,35.1780],[129.0852,35.1780],[129.0852,35.1720],[129.0752,35.1720],[129.0752,35.1780]]]}},
  {type:'Feature',properties:{name:'연산8동'},geometry:{type:'Polygon',coordinates:[[[129.0852,35.1780],[129.0910,35.1780],[129.0910,35.1720],[129.0852,35.1720],[129.0852,35.1780]]]}},
  {type:'Feature',properties:{name:'연산9동'},geometry:{type:'Polygon',coordinates:[[[129.0682,35.1720],[129.0910,35.1720],[129.0910,35.1660],[129.0682,35.1660],[129.0682,35.1720]]]}},
]};

const DONG_COLORS=['#a855f7','#06b6d4','#f59e0b','#10b981','#f43f5e','#3b82f6','#84cc16','#f97316','#ec4899','#14b8a6','#8b5cf6','#ef4444'];

function drawDong(){
  YEONJE_DONG.features.forEach((f,i)=>{
    const coords=f.geometry.coordinates[0].map(c=>new naver.maps.LatLng(c[1],c[0]));
    const color=DONG_COLORS[i%DONG_COLORS.length];
    const poly=new naver.maps.Polygon({map,paths:[coords],strokeColor:color,strokeWeight:2,strokeOpacity:0.9,fillColor:color,fillOpacity:0.12});
    const center=coords.reduce((acc,c)=>({lat:acc.lat+c.lat()/coords.length,lng:acc.lng+c.lng()/coords.length}),{lat:0,lng:0});
    const label=new naver.maps.Marker({position:new naver.maps.LatLng(center.lat,center.lng),map,icon:{content:`<div style="background:rgba(12,14,20,0.82);color:${color};border:1px solid ${color};border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;">${f.properties.name}</div>`,anchor:new naver.maps.Point(30,12)},zIndex:5});
    dongPolygons.push(poly);
    dongLabels.push(label);
  });
}
function toggleDong(){
  showDong=!showDong;
  const btn=document.getElementById('dongBtn');
  dongPolygons.forEach(p=>p.setMap(showDong?map:null));
  dongLabels.forEach(l=>l.setMap(showDong?map:null));
  btn.classList.toggle('on-purple',showDong);
}
drawDong();

// ── 투표소 API ─────────────────────────────────────────────
async function fetchVoteStations(type){
  // type: 'pre'=사전투표소, 'day'=선거일투표소
  const op = type==='pre'
    ? 'getPrePolplcOtlnmapTrnsportInfoInqire'
    : 'getPolplcOtlnmapTrnsportInfoInqire';
  const url=`https://apis.data.go.kr/9760000/PolplcInfoInqireService2/${op}?serviceKey=${API_KEY}&sgId=${SG_ID}&sdName=부산광역시&wiwName=연제구&numOfRows=100&pageNo=1&_type=json`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    const items=data?.response?.body?.items?.item;
    if(!items) return [];
    return Array.isArray(items)?items:[items];
  }catch(e){
    console.error('투표소 API 오류',e);
    return [];
  }
}

function makeVoteMarker(item, type){
  const lat=parseFloat(item.lat||item.latitude||0);
  const lng=parseFloat(item.lng||item.longitude||0);
  if(!lat||!lng) return null;

  const isPre = type==='pre';
  const color = isPre ? '#2563eb' : '#ff4757';
  const icon = isPre ? '🗳' : '📍';

  const marker=new naver.maps.Marker({
    position:new naver.maps.LatLng(lat,lng),
    map,
    icon:{
      content:`<div style="
        background:${color};color:#fff;
        border:2px solid #fff;
        border-radius:50%;
        width:28px;height:28px;
        display:flex;align-items:center;justify-content:center;
        font-size:13px;
        box-shadow:0 2px 8px rgba(0,0,0,0.4);
        transform:translate(-14px,-14px);
        cursor:pointer;
      ">${icon}</div>`,
      anchor:new naver.maps.Point(0,0)
    },
    zIndex:30
  });

  naver.maps.Event.addListener(marker,'click',()=>{
    document.getElementById('vpType').textContent = isPre ? '🗳 사전투표소' : '📍 선거일투표소';
    document.getElementById('vpName').textContent = item.polplcNm || item.prepolplcNm || '투표소';
    document.getElementById('vpAddr').textContent = item.dtlAddr || item.addr || '주소 정보 없음';
    document.getElementById('votePopup').classList.add('show');
  });

  return marker;
}

async function toggleVote(type){
  const btn=document.getElementById(type==='pre'?'preBtn':'dayBtn');
  const markers = type==='pre' ? preMarkers : dayMarkers;
  const showing = type==='pre' ? showPre : showDay;

  if(showing){
    markers.forEach(m=>m.setMap(null));
    if(type==='pre'){showPre=false;preMarkers=[];}
    else{showDay=false;dayMarkers=[];}
    btn.classList.remove('on-blue','on-red');
    return;
  }

  btn.textContent='⏳';
  const items=await fetchVoteStations(type);

  if(!items.length){
    alert('투표소 정보를 불러올 수 없습니다.\n(API 키 승인 후 약 1~2시간 소요될 수 있습니다)');
    btn.textContent = type==='pre'?'🗳':'📍';
    return;
  }

  const newMarkers=[];
  items.forEach(item=>{
    const m=makeVoteMarker(item,type);
    if(m) newMarkers.push(m);
  });

  if(type==='pre'){preMarkers=newMarkers;showPre=true;btn.classList.add('on-blue');}
  else{dayMarkers=newMarkers;showDay=true;btn.classList.add('on-red');}
  btn.textContent = type==='pre'?'🗳':'📍';

  if(!newMarkers.length) alert('연제구 투표소 위치 좌표가 아직 제공되지 않습니다.');
}

// ── 나침반 ────────────────────────────────────────────────
function updateCompass(h){lastHeading=h;document.getElementById('needle').setAttribute('transform',`rotate(${h},20,20)`);}
function startCompass(){if(!window.DeviceOrientationEvent)return;if(typeof DeviceOrientationEvent.requestPermission==='function'){DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('deviceorientation',onOrient);});}else{window.addEventListener('deviceorientation',onOrient);}}
function onOrient(e){let h=e.webkitCompassHeading||e.alpha||0;updateCompass(h);}
function setType(t,b){document.querySelectorAll('.tb').forEach(x=>x.classList.remove('on'));b.classList.add('on');map.setMapTypeId(naver.maps.MapTypeId[t]);}
function dist(a,b){const R=6371000,r=x=>x*Math.PI/180,dLa=r(b.lat()-a.lat()),dLn=r(b.lng()-a.lng());return R*2*Math.atan2(Math.sqrt(Math.sin(dLa/2)**2+Math.cos(r(a.lat()))*Math.cos(r(b.lat()))*Math.sin(dLn/2)**2),Math.sqrt(1-Math.sin(dLa/2)**2-Math.cos(r(a.lat()))*Math.cos(r(b.lat()))*Math.sin(dLn/2)**2));}
function eLL(c,r){return new naver.maps.LatLng(c.lat(),c.lng()+(r/(6378137*Math.cos(c.lat()*Math.PI/180)))*(180/Math.PI));}
function toggleLock(){
  if(!cM){alert('먼저 중심점을 설정하세요.');return;}
  isLocked=!isLocked;
  const btn=document.getElementById('lockBtn'),badge=document.getElementById('lockBadge'),statR=document.getElementById('statR'),sl=document.getElementById('sl');
  if(isLocked){btn.textContent='🔒';btn.classList.add('locked');badge.classList.add('show');statR.classList.add('locked-stat');sl.disabled=true;if(cM)cM.setOptions({draggable:false});if(eM)eM.setOptions({draggable:false});document.querySelectorAll('.pb').forEach(b=>b.disabled=true);}
  else{btn.textContent='🔓';btn.classList.remove('locked');badge.classList.remove('show');statR.classList.remove('locked-stat');sl.disabled=false;if(cM)cM.setOptions({draggable:true});if(eM)eM.setOptions({draggable:true});document.querySelectorAll('.pb').forEach(b=>b.disabled=false);}
}
function place(pos){
  if(isLocked)return;
  if(cM){cM.setMap(null);circ.setMap(null);eM.setMap(null);}
  cM=new naver.maps.Marker({position:pos,map,icon:{content:'<div style="width:20px;height:20px;background:#03C75A;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 3px rgba(3,199,90,.4);transform:translate(-10px,-10px);cursor:move"></div>',anchor:new naver.maps.Point(0,0)},draggable:true});
  circ=new naver.maps.Circle({map,center:pos,radius:rM,strokeColor:'#03C75A',strokeWeight:2,strokeStyle:'dash',strokeOpacity:.9,fillColor:'#03C75A',fillOpacity:.08});
  eM=new naver.maps.Marker({position:eLL(pos,rM),map,icon:{content:'<div style="width:16px;height:16px;background:#fff;border:3px solid #2563eb;border-radius:50%;box-shadow:0 0 0 3px rgba(37,99,235,.3);transform:translate(-8px,-8px);cursor:ew-resize"></div>',anchor:new naver.maps.Point(0,0)},draggable:true});
  naver.maps.Event.addListener(cM,'drag',e=>{if(isLocked)return;circ.setCenter(e.coord);eM.setPosition(eLL(e.coord,rM));upd(e.coord);});
  naver.maps.Event.addListener(eM,'drag',e=>{if(isLocked)return;const c=cM.getPosition();rM=Math.max(50,Math.min(50000,Math.round(dist(c,e.coord))));circ.setRadius(rM);document.getElementById('sl').value=rM;upd(c);});
  upd(pos);
}
naver.maps.Event.addListener(map,'click',e=>{if(!isLocked)place(e.coord);});
function updateMyDot(lat,lng,acc,heading){
  const pos=new naver.maps.LatLng(lat,lng);
  const arrow=`<div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:22px solid #2563eb;transform:translate(-8px,-20px) rotate(${heading}deg);filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))"></div>`;
  const dot='<div style="width:16px;height:16px;background:#2563eb;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(37,99,235,.3);transform:translate(-8px,-8px)"></div>';
  if(!myDot){myDot=new naver.maps.Marker({position:pos,map,icon:{content:dot,anchor:new naver.maps.Point(0,0)},zIndex:20});myAcc=new naver.maps.Circle({map,center:pos,radius:acc,strokeColor:'#2563eb',strokeWeight:1,strokeOpacity:.4,fillColor:'#2563eb',fillOpacity:.06});myArrow=new naver.maps.Marker({position:pos,map,icon:{content:arrow,anchor:new naver.maps.Point(0,0)},zIndex:21});}
  else{myDot.setPosition(pos);myAcc.setCenter(pos);myAcc.setRadius(acc);myArrow.setPosition(pos);myArrow.setIcon({content:arrow,anchor:new naver.maps.Point(0,0)});}
}
function toggleTracking(){isTracking?stopTracking():startTracking();}
function startTracking(){if(!navigator.geolocation){alert('위치 서비스 미지원');return;}isTracking=true;document.getElementById('trackBtn').classList.add('tracking');startCompass();watchId=navigator.geolocation.watchPosition(pos=>{const{latitude:lat,longitude:lng,accuracy:acc,heading:h}=pos.coords;const heading=h!=null?h:lastHeading;updateMyDot(lat,lng,acc,heading);updateCompass(heading);if(isTracking)map.setCenter(new naver.maps.LatLng(lat,lng));},err=>{alert('위치 추적 실패');stopTracking();},{enableHighAccuracy:true,maximumAge:500,timeout:10000});}
function stopTracking(){isTracking=false;document.getElementById('trackBtn').classList.remove('tracking');if(watchId!==null){navigator.geolocation.clearWatch(watchId);watchId=null;}}
function locateOnce(){if(!navigator.geolocation){alert('위치 서비스 미지원');return;}navigator.geolocation.getCurrentPosition(pos=>{const ll=new naver.maps.LatLng(pos.coords.latitude,pos.coords.longitude);map.setCenter(ll);map.setZoom(15);updateMyDot(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy,lastHeading);if(!isLocked)place(ll);},()=>alert('위치를 가져올 수 없습니다.'));}
function upd(p){const f=m=>m>=1000?(m/1000).toFixed(2)+' km':Math.round(m)+' m';const fa=m=>m>=1e6?(m/1e6).toFixed(2)+' km²':m>=10000?(m/10000).toFixed(1)+' ha':Math.round(m)+' m²';document.getElementById('vR').textContent=f(rM);document.getElementById('vD').textContent=f(rM*2);document.getElementById('vA').textContent=fa(Math.PI*rM*rM);document.getElementById('sv').textContent=f(rM);document.getElementById('ci').textContent=`중심: ${p.lat().toFixed(5)}°N, ${p.lng().toFixed(5)}°E`;}
function onSl(v){if(isLocked)return;rM=parseInt(v);const f=m=>m>=1000?(m/1000).toFixed(2)+' km':Math.round(m)+' m';document.getElementById('sv').textContent=f(rM);if(circ){circ.setRadius(rM);eM.setPosition(eLL(cM.getPosition(),rM));upd(cM.getPosition());}}
[{l:'200m',v:200},{l:'500m',v:500},{l:'1km',v:1000},{l:'3km',v:3000},{l:'5km',v:5000},{l:'10km',v:10000}].forEach(p=>{const b=document.createElement('button');b.className='pb';b.textContent=p.l;b.onclick=()=>{if(isLocked)return;document.querySelectorAll('.pb').forEach(x=>x.classList.remove('on'));b.classList.add('on');rM=p.v;document.getElementById('sl').value=p.v;if(circ){circ.setRadius(p.v);eM.setPosition(eLL(cM.getPosition(),p.v));upd(cM.getPosition());}else document.getElementById('sv').textContent=p.v>=1000?(p.v/1000)+' km':p.v+' m';};document.getElementById('ps').appendChild(b);});
function clearAll(){isLocked=false;document.getElementById('lockBtn').textContent='🔓';document.getElementById('lockBtn').classList.remove('locked');document.getElementById('lockBadge').classList.remove('show');document.getElementById('statR').classList.remove('locked-stat');document.getElementById('sl').disabled=false;document.querySelectorAll('.pb').forEach(b=>b.disabled=false);if(cM){cM.setMap(null);circ.setMap(null);eM.setMap(null);cM=circ=eM=null;}['vR','vD','vA'].forEach(id=>document.getElementById(id).textContent='—');document.getElementById('ci').textContent='중심점을 설정하세요';}
async function doSearch(){const q=document.getElementById('si').value.trim();if(!q)return;try{const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&accept-language=ko&countrycodes=kr`,{headers:{'Accept-Language':'ko'}});const data=await res.json();if(!data||!data.length){alert('검색 결과가 없습니다.');return;}const ll=new naver.maps.LatLng(parseFloat(data[0].lat),parseFloat(data[0].lon));map.setCenter(ll);map.setZoom(15);if(!isLocked)place(ll);document.getElementById('si').value='';}catch(e){alert('검색 오류: '+e.message);}}
startCompass();
</script>
</body>
